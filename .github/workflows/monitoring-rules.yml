name: Monitoring rules

on:
  pull_request:
    paths:
      - "monitoring/**"
      - ".github/workflows/monitoring-rules.yml"
  push:
    branches:
      - main
    paths:
      - "monitoring/**"
      - ".github/workflows/monitoring-rules.yml"

permissions:
  contents: read

jobs:
  prometheus-rules:
    name: Prometheus rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Prometheus rules
        run: >-
          docker run --rm
          --entrypoint /bin/promtool
          -v "$PWD/monitoring:/rules:ro"
          prom/prometheus:v3.12.0
          check rules /rules/resourcefs-p0-alerts.yaml
