apiVersion: v1
kind: Namespace
metadata:
  name: lens-rhyme
---
apiVersion: v1
kind: Secret
metadata:
  name: lens-rhyme-secrets
  namespace: lens-rhyme
type: Opaque
stringData:
  SECRET_KEY: replace-with-a-random-secret
  OPENVIKING_CLIENT_API_KEY: lens-rhyme-openviking-local-root-key
  OPENVIKING_ROOT_API_KEY: lens-rhyme-openviking-local-root-key
  OPENVIKING_API_KEY: ""
  OSS_ACCESS_KEY_ID: ""
  OSS_ACCESS_KEY_SECRET: ""
  OSS_ENDPOINT: ""
  OSS_BUCKET_NAME: ""
  OSS_CDN_DOMAIN: ""
  ARK_API_KEY: ""
  POSTGRES_PASSWORD: lens_rhyme
  DATABASE_URL: postgresql://lens_rhyme:lens_rhyme@postgres:5432/lens_rhyme
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lens-rhyme-config
  namespace: lens-rhyme
data:
  ALGORITHM: HS256
  HOST: 0.0.0.0
  PORT: "8000"
  DEBUG: "False"
  RELOAD: "False"
  BACKEND_DATA_PATH: /app/data
  BACKEND_OUTPUTS_PATH: /app/outputs
  OPENVIKING_URL: http://openviking:1933
  OPENVIKING_ACCOUNT: lens-rhyme
  OPENVIKING_USER: backend
  OPENVIKING_API_BASE: https://ark.cn-beijing.volces.com/api/v3
  OPENVIKING_PROVIDER: volcengine
  OPENVIKING_VLM_MODEL: doubao-seed-2-0-pro-260215
  OPENVIKING_EMBEDDING_MODEL: doubao-embedding-vision-251215
  OPENVIKING_EMBEDDING_DIMENSION: "1024"
  OPENVIKING_EMBEDDING_INPUT: multimodal
  ADMIN_DEFAULT_USERNAME: admin
  ADMIN_DEFAULT_PASSWORD: admin123
  TEST_USER_USERNAME: test_user
  TEST_USER_PASSWORD: password123
  POSTGRES_DB: lens_rhyme
  POSTGRES_USER: lens_rhyme
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lens-rhyme-nginx
  namespace: lens-rhyme
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        client_max_body_size 2g;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

        location ~* _next/static/ {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ^~ /admin {
            return 404;
        }

        location = /docs {
            return 301 /docs/;
        }

        location ^~ /docs/ {
            proxy_pass http://docs-site:80;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location /api/v1/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600;
            proxy_connect_timeout 600;
            proxy_send_timeout 600;

            proxy_request_buffering off;
            proxy_buffering off;
        }

        location /outputs/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       8080;
        server_name  localhost;

        client_max_body_size 2g;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

        location /api/v1/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600;
            proxy_connect_timeout 600;
            proxy_send_timeout 600;

            proxy_request_buffering off;
            proxy_buffering off;
        }

        location /outputs/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* _next/static/ {
            proxy_pass http://admin-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            proxy_pass http://admin-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://admin-frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: lens-rhyme
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openviking-data
  namespace: lens-rhyme
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data
  namespace: lens-rhyme
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-outputs
  namespace: lens-rhyme
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16.2
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: lens-rhyme-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: lens-rhyme-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lens-rhyme-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - lens_rhyme
                - -d
                - lens_rhyme
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lens-rhyme
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
    spec:
      containers:
        - name: openviking
          image: ghcr.io/volcengine/openviking:latest
          ports:
            - containerPort: 1933
          envFrom:
            - configMapRef:
                name: lens-rhyme-config
            - secretRef:
                name: lens-rhyme-secrets
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /root/.openviking /data/openviking/workspace
              python - <<'PY'
              import json
              import os

              config = {
                  "server": {
                      "host": "0.0.0.0",
                      "port": 1933,
                      "auth_mode": "api_key",
                      "root_api_key": os.getenv("OPENVIKING_ROOT_API_KEY", ""),
                  },
                  "storage": {"workspace": "/data/openviking/workspace"},
                  "log": {"level": "INFO", "output": "stdout"},
                  "embedding": {
                      "dense": {
                          "api_base": os.getenv("OPENVIKING_API_BASE", "https://ark.cn-beijing.volces.com/api/v3"),
                          "api_key": os.getenv("OPENVIKING_API_KEY", ""),
                          "provider": os.getenv("OPENVIKING_PROVIDER", "volcengine"),
                          "dimension": int(os.getenv("OPENVIKING_EMBEDDING_DIMENSION", "1024")),
                          "model": os.getenv("OPENVIKING_EMBEDDING_MODEL", "doubao-embedding-vision-251215"),
                          "input": os.getenv("OPENVIKING_EMBEDDING_INPUT", "multimodal"),
                      },
                      "max_concurrent": 10,
                  },
                  "vlm": {
                      "api_base": os.getenv("OPENVIKING_API_BASE", "https://ark.cn-beijing.volces.com/api/v3"),
                      "api_key": os.getenv("OPENVIKING_API_KEY", ""),
                      "provider": os.getenv("OPENVIKING_PROVIDER", "volcengine"),
                      "model": os.getenv("OPENVIKING_VLM_MODEL", "doubao-seed-2-0-pro-260215"),
                      "max_retries": 2,
                      "max_concurrent": 100,
                  },
              }

              with open("/root/.openviking/ov.conf", "w", encoding="utf-8") as f:
                  json.dump(config, f, indent=2)
              PY
              exec openviking-server --config /root/.openviking/ov.conf --host 0.0.0.0 --port 1933
          volumeMounts:
            - name: openviking-data
              mountPath: /data/openviking
      volumes:
        - name: openviking-data
          persistentVolumeClaim:
            claimName: openviking-data
---
apiVersion: v1
kind: Service
metadata:
  name: openviking
  namespace: lens-rhyme
spec:
  selector:
    app: openviking
  ports:
    - port: 1933
      targetPort: 1933
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: registry.cn-hangzhou.aliyuncs.com/lens-rhyme/lens-rhyme-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: lens-rhyme-config
            - secretRef:
                name: lens-rhyme-secrets
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
            - name: backend-outputs
              mountPath: /app/outputs
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data
        - name: backend-outputs
          persistentVolumeClaim:
            claimName: backend-outputs
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lens-rhyme
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.cn-hangzhou.aliyuncs.com/lens-rhyme/lens-rhyme-frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lens-rhyme
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
        - name: admin-frontend
          image: registry.cn-hangzhou.aliyuncs.com/lens-rhyme/lens-rhyme-admin-frontend:latest
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
  namespace: lens-rhyme
spec:
  selector:
    app: admin-frontend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-site
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-site
  template:
    metadata:
      labels:
        app: docs-site
    spec:
      containers:
        - name: docs-site
          image: registry.cn-hangzhou.aliyuncs.com/lens-rhyme/lens-rhyme-docs-site:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: docs-site
  namespace: lens-rhyme
spec:
  selector:
    app: docs-site
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: lens-rhyme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: lens-rhyme-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: lens-rhyme
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: admin
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lens-rhyme
  namespace: lens-rhyme
spec:
  rules:
    - host: lens-rhyme.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
    - host: admin.lens-rhyme.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 8080
