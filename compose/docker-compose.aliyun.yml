services:
  backend-init:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-backend:${IMAGE_TAG:-latest}
    volumes:
      - backend_data:/app/data
      - backend_outputs:/app/outputs
      - codex_home:/codex-home
    environment:
      DATABASE_URL: postgresql://lens_rhyme:lens_rhyme@postgres:5432/lens_rhyme
      BACKEND_DATA_PATH: /app/data
      BACKEND_OUTPUTS_PATH: /app/outputs
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      DEPLOYMENT_INIT_CREATE_ADMIN: ${DEPLOYMENT_INIT_CREATE_ADMIN:-true}
      DEPLOYMENT_INIT_TEST_DATA: ${DEPLOYMENT_INIT_TEST_DATA:-false}
      TEST_USER_USERNAME: ${TEST_USER_USERNAME:-test_user}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
      DEPLOYMENT_INIT_PLATFORM_CONFIG_JSON: ${DEPLOYMENT_INIT_PLATFORM_CONFIG_JSON:-}
      DEPLOYMENT_INIT_PLATFORM_CONFIG_FORCE: ${DEPLOYMENT_INIT_PLATFORM_CONFIG_FORCE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - scripts.deployment_init
    restart: "no"

  backend:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-backend:${IMAGE_TAG:-latest}
    volumes:
      - backend_data:/app/data
      - backend_outputs:/app/outputs
      - codex_home:/codex-home
    environment:
      SECRET_KEY: ${SECRET_KEY:-lens-rhyme-local-dev-key}
      DATABASE_URL: postgresql://lens_rhyme:lens_rhyme@postgres:5432/lens_rhyme
      BACKEND_DATA_PATH: /app/data
      BACKEND_OUTPUTS_PATH: /app/outputs
      OPENVIKING_URL: http://openviking:1933
      OPENVIKING_AUTH_MODE: api_key
      OPENVIKING_CLIENT_API_KEY: ${OPENVIKING_CLIENT_API_KEY:-}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_HOME: /codex-home
      CODEX_AUTO_LOGIN: ${CODEX_AUTO_LOGIN:-true}
      CHAT_CODEX_APPROVAL_POLICY: never
      CHAT_CODEX_USE_SELECTED_MODEL: "false"
      CHAT_CODEX_RUNNER_MANAGER_URL: http://codex-runner-manager:8080
      CODEX_RUNNER_MANAGER_TOKEN: ${CODEX_RUNNER_MANAGER_TOKEN:-lens-rhyme-runner-local-token}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_ACCESS_KEY_SECRET: ${OBJECT_STORAGE_ACCESS_KEY_SECRET:-}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME:-}
      OBJECT_STORAGE_CDN_DOMAIN: ${OBJECT_STORAGE_CDN_DOMAIN:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      OBJECT_STORAGE_ADDRESSING_STYLE: ${OBJECT_STORAGE_ADDRESSING_STYLE:-}
      OBJECT_STORAGE_CONNECT_TIMEOUT: ${OBJECT_STORAGE_CONNECT_TIMEOUT:-}
      OBJECT_STORAGE_READ_TIMEOUT: ${OBJECT_STORAGE_READ_TIMEOUT:-}
      OBJECT_STORAGE_MOCK_UPLOAD: ${OBJECT_STORAGE_MOCK_UPLOAD:-false}
      RESOURCEFS_BUCKET: ${RESOURCEFS_BUCKET:-resources}
      RESOURCEFS_CDN_BASE_URL: ${RESOURCEFS_CDN_BASE_URL:-}
      RESOURCEFS_CDN_SIGNING_SECRET: ${RESOURCEFS_CDN_SIGNING_SECRET:-}
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      openviking:
        condition: service_started
      codex-runner-manager:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p "$${CODEX_HOME:-/codex-home}"
        if [ "$${CODEX_AUTO_LOGIN:-true}" = "true" ] && [ -n "$${OPENAI_API_KEY:-}" ] && [ ! -s "$${CODEX_HOME:-/codex-home}/auth.json" ]; then
          printenv OPENAI_API_KEY | codex login --with-api-key >/tmp/codex-login.log 2>&1 || {
            cat /tmp/codex-login.log >&2
            exit 1
          }
        fi
        exec python -m scripts.server start --host 0.0.0.0 --port 8000
    restart: always

  codex-runner-manager:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-backend:${IMAGE_TAG:-latest}
    volumes:
      - codex_home:/codex-home
      - codex_runner_data:/app/data
      - backend_outputs:/app/outputs
    environment:
      CODEX_HOME: /codex-home
      CODEX_AUTO_LOGIN: ${CODEX_AUTO_LOGIN:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHAT_CODEX_BINARY: codex
      CHAT_CODEX_APPROVAL_POLICY: never
      CHAT_CODEX_USE_SELECTED_MODEL: "false"
      CHAT_CODEX_ALLOW_WEB_ACCESS: "false"
      CHAT_PLATFORM_CONFIG_ENV_ONLY: "true"
      CODEX_RUNNER_MANAGER_TOKEN: ${CODEX_RUNNER_MANAGER_TOKEN:-lens-rhyme-runner-local-token}
      CODEX_RUNNER_WORKDIR_ROOT: /app/data/workdirs
      CODEX_RUNNER_TURN_TIMEOUT_SECONDS: "600"
      CODEX_RUNNER_OUTPUT_CHUNK_BYTES: "16384"
      CODEX_RUNNER_OUTPUT_TURN_BYTES: "16777216"
      RUNNER_SUBSTRATE: process
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p "$${CODEX_HOME:-/codex-home}" "$${CODEX_RUNNER_WORKDIR_ROOT:-/app/data/workdirs}"
        if [ "$${CODEX_AUTO_LOGIN:-true}" = "true" ] && [ -n "$${OPENAI_API_KEY:-}" ] && [ ! -s "$${CODEX_HOME:-/codex-home}/auth.json" ]; then
          printenv OPENAI_API_KEY | codex login --with-api-key >/tmp/codex-login.log 2>&1 || {
            cat /tmp/codex-login.log >&2
            exit 1
          }
        fi
        exec python -m scripts.runner_manager --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: always

  openviking:
    image: ghcr.io/volcengine/openviking:latest
    environment:
      OPENVIKING_API_BASE: https://ark.cn-beijing.volces.com/api/v3
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY:-}
      OPENVIKING_PROVIDER: volcengine
      OPENVIKING_VLM_MODEL: doubao-seed-2-0-pro-260215
      OPENVIKING_EMBEDDING_MODEL: doubao-embedding-vision-251215
      OPENVIKING_EMBEDDING_DIMENSION: "1024"
      OPENVIKING_EMBEDDING_INPUT: multimodal
      OPENVIKING_ROOT_API_KEY: ${OPENVIKING_ROOT_API_KEY:-lens-rhyme-openviking-local-root-key}
    ports:
      - "1933:1933"
    volumes:
      - openviking_data:/data/openviking
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /root/.openviking /data/openviking/workspace
        python - <<'PY'
        import json
        import os

        config = {
            "server": {
                "host": "0.0.0.0",
                "port": 1933,
                "auth_mode": "api_key",
                "root_api_key": os.getenv("OPENVIKING_ROOT_API_KEY", ""),
            },
            "storage": {"workspace": "/data/openviking/workspace"},
            "log": {"level": "INFO", "output": "stdout"},
            "embedding": {
                "dense": {
                    "api_base": os.getenv("OPENVIKING_API_BASE", "https://ark.cn-beijing.volces.com/api/v3"),
                    "api_key": os.getenv("OPENVIKING_API_KEY", ""),
                    "provider": os.getenv("OPENVIKING_PROVIDER", "volcengine"),
                    "dimension": int(os.getenv("OPENVIKING_EMBEDDING_DIMENSION", "1024")),
                    "model": os.getenv("OPENVIKING_EMBEDDING_MODEL", "doubao-embedding-vision-251215"),
                    "input": os.getenv("OPENVIKING_EMBEDDING_INPUT", "multimodal"),
                },
                "max_concurrent": 10,
            },
            "vlm": {
                "api_base": os.getenv("OPENVIKING_API_BASE", "https://ark.cn-beijing.volces.com/api/v3"),
                "api_key": os.getenv("OPENVIKING_API_KEY", ""),
                "provider": os.getenv("OPENVIKING_PROVIDER", "volcengine"),
                "model": os.getenv("OPENVIKING_VLM_MODEL", "doubao-seed-2-0-pro-260215"),
                "max_retries": 2,
                "max_concurrent": 100,
            },
        }

        with open("/root/.openviking/ov.conf", "w", encoding="utf-8") as f:
            json.dump(config, f, indent=2)
        PY
        exec openviking-server --config /root/.openviking/ov.conf --host 0.0.0.0 --port 1933
    restart: always

  postgres:
    image: postgres:16.2
    environment:
      POSTGRES_DB: lens_rhyme
      POSTGRES_USER: lens_rhyme
      POSTGRES_PASSWORD: lens_rhyme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens_rhyme -d lens_rhyme"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  frontend:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-frontend:${IMAGE_TAG:-latest}
    restart: always

  admin-frontend:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-admin-frontend:${IMAGE_TAG:-latest}
    restart: always

  docs-site:
    image: ${IMAGE_REGISTRY:-registry.cn-hangzhou.aliyuncs.com/lens-rhyme}/lens-rhyme-docs-site:${IMAGE_TAG:-latest}
    restart: always

  nginx:
    image: nginx:alpine
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "5410:80"
      - "5041:8080"
    depends_on:
      - backend
      - frontend
      - admin-frontend
      - docs-site
    restart: always

volumes:
  backend_data:
  backend_outputs:
  codex_home:
  codex_runner_data:
  postgres_data:
  openviking_data:

configs:
  nginx_config:
    content: |
      server {
          listen       80;
          server_name  localhost;

          resolver 127.0.0.11 valid=30s ipv6=off;

          client_max_body_size 2g;

          gzip on;
          gzip_vary on;
          gzip_min_length 1024;
          gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

          location ~* _next/static/ {
              set $$upstream http://frontend:3000;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              expires 1y;
              add_header Cache-Control "public, immutable";
          }

          location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$$ {
              set $$upstream http://frontend:3000;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              expires 1y;
              add_header Cache-Control "public, immutable";
          }

          location ^~ /admin {
              return 404;
          }

          location = /docs {
              return 301 $$scheme://$$http_host/docs/;
          }

          location ^~ /docs/ {
              set $$upstream http://docs-site:80;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location / {
              set $$upstream http://frontend:3000;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              add_header Cache-Control "no-cache, no-store, must-revalidate";
          }

          location /api/v1/ {
              set $$upstream http://backend:8000;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              proxy_read_timeout 600;
              proxy_connect_timeout 600;
              proxy_send_timeout 600;

              proxy_request_buffering off;
              proxy_buffering off;
          }

          location /outputs/ {
              set $$upstream http://backend:8000;
              proxy_pass $$upstream;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }
      }

      server {
          listen       8080;
          server_name  localhost;

          resolver 127.0.0.11 valid=30s ipv6=off;

          client_max_body_size 2g;

          gzip on;
          gzip_vary on;
          gzip_min_length 1024;
          gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

          location /api/v1/ {
              set $$upstream http://backend:8000;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              proxy_read_timeout 600;
              proxy_connect_timeout 600;
              proxy_send_timeout 600;

              proxy_request_buffering off;
              proxy_buffering off;
          }

          location /outputs/ {
              set $$upstream http://backend:8000;
              proxy_pass $$upstream;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location ~* _next/static/ {
              set $$upstream http://admin-frontend:3001;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              expires 1y;
              add_header Cache-Control "public, immutable";
          }

          location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$$ {
              set $$upstream http://admin-frontend:3001;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              expires 1y;
              add_header Cache-Control "public, immutable";
          }

          location / {
              set $$upstream http://admin-frontend:3001;
              proxy_pass $$upstream;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;

              add_header Cache-Control "no-cache, no-store, must-revalidate";
          }
      }
